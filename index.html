<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluacion JS</title>
    <!-- Estilos boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                        <a class="nav-link" href="#">Features</a>
                        <a class="nav-link" href="#">Pricing</a>
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="contenedor p-3 d-flex flex-wrap gap-3">

        <!-- Ejercicio 1 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 1</h5>
                <p class="card-text">Pago de Permisos</p>
                <input type="text" class="form-control mb-3" id="input1" placeholder="Ingresar un nombre">
                <a href="#" class="btn btn-primary" onclick="permiso()">Ejecutar</a>
                <div id="resultado-container1" class="mt-4 d-none">
                    <h6>Resultado: </h6>
                    <div id="result1" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>

        <!-- Ejercicio 2 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 2</h5>
                <p class="card-text">Fila de Vacunación</p>
                <input type="text" class="form-control mb-3" id="input2" placeholder="Ingresar un nombre">
                <a id="Normal" href="#" class="btn btn-primary" onclick="listadoVacuna()">Normal</a>
                <a id="Urgencia" href="#" class="btn btn-danger" onclick="listadoVacuna()">Urgencia</a>
                <div id="resultado-container2" class="mt-4 d-none">
                    <h6>Resultado: </h6>
                    <div id="result2" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>

        <!-- Ejercicio 3 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 3</h5>
                <p class="card-text">Buscador de Beneficiarios</p>
                <input type="text" class="form-control mb-3" id="input3" placeholder="Ingresar un nombre">
                <a href="#" class="btn btn-primary" onclick="verificarNombre()">Ejecutar</a>
                <div id="resultado-container3" class="mt-4 d-none">
                    <h6>Resultado: </h6>
                    <div id="result3" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="static/js/script.js"></script>
    <!-- Script de boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
